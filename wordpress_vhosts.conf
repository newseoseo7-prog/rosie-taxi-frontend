<VirtualHost *:443>

    ServerName rosietaxicab.com
    ServerAlias www.rosietaxicab.com
    ServerAdmin abidkarimi049@gmail.com
    SuexecUserGroup rosie6311 rosie6311
    DocumentRoot /home/rosietaxicab.com/public_html
