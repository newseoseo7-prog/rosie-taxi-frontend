server {
    # Listen on port 443 (HTTPS)
    server_name rosidev.livinservices.com;

    # Proxy requests to the Next.js server
    location / {
        proxy_pass http://127.0.0.1:3000;  # Replace with the port your Next.js app is running on
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve static files from .next/static directory
    location /_next/static/ {
        alias /var/www/rosie_frontend/.next/static/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Optional: Serve images and other assets directly
    location /public/ {
        root /var/www/rosie_frontend;
        access_log off;
        expires 30d;
    }

    # Gzip compression for improved performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_proxied any;
    gzip_min_length 1024;

    # Optional: Add security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/rosidev.livinservices.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/rosidev.livinservices.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = rosidev.livinservices.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


     listen 80;
    server_name rosidev.livinservices.com;
    return 404; # managed by Certbot


}