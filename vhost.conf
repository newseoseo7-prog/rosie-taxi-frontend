<VirtualHost *:443>
    ServerName new.rosietaxicab.com

    # Enable Reverse Proxy
    ProxyRequests Off
    ProxyPreserveHost On

    <IfModule LiteSpeed>
        ProxyPass        / http://127.0.0.1:3001/
        ProxyPassReverse / http://127.0.0.1:3001/
    </IfModule>

    # Optional: Allow WebSocket support
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule .* ws://127.0.0.1:3001%{REQUEST_URI} [P]

    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/new.rosietaxicab.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/new.rosietaxicab.com/privkey.pem

</VirtualHost>
<VirtualHost *:80>

    ServerName new.rosietaxicab.com
    ServerAlias www.new.rosietaxicab.com
    ServerAdmin nhnansari@gmail.com
    SuexecUserGroup newro7418 newro7418
    DocumentRoot /home/new.rosietaxicab.com/public_html
    Alias /.well-known/acme-challenge /usr/local/lsws/Example/html/.well-known/acme-challenge
    CustomLog /home/new.rosietaxicab.com/logs/new.rosietaxicab.com.access_log combined
    AddHandler application/x-httpd-php80 .php .php7 .phtml
    <IfModule LiteSpeed>
        CacheRoot lscache
        CacheLookup on
    </IfModule>

</VirtualHost>
